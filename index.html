<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space</title>
    <style>
        /* CSS Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0c10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        .content {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: clamp(8rem, 20vw, 12rem);
            margin: 0;
            line-height: 1;
            background: linear-gradient(180deg, #6c63ff, #3f3d56);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(108, 99, 255, 0.3));
            cursor: default;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 300;
            color: #cbd5e0;
            margin: 10px 0 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            background-color: #6c63ff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.6);
            background-color: #574fcf;
        }

        /* Simple Star Background */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="stars" id="star-container"></div>

    <div class="content">
        <h1 id="error-text">404</h1>
        <h2>Houston, we have a problem.</h2>
        <p style="color: #718096; margin-bottom: 30px;">The page you're looking for doesn't exist.</p>
        <a href="/" class="btn">Return to Base</a>
    </div>

    <script>
        // Generate random stars for the background
        const container = document.getElementById('star-container');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            // Random positions and sizes
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const size = Math.random() * 3;
            const duration = 2 + Math.random() * 3;

            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${duration}s`);
            
            container.appendChild(star);
        }

        // Interactive Mouse Movement for the 404 text
        document.addEventListener('mousemove', (e) => {
            const text = document.getElementById('error-text');
            const moveX = (window.innerWidth / 2 - e.pageX) / 30;
            const moveY = (window.innerHeight / 2 - e.pageY) / 30;
            
            text.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
