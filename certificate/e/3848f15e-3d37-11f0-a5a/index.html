<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ldetu Beyene</title>
    <style>
        /* 1. Reset default browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 2. Ensure the body takes up the full screen height */
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Removes scrollbars for a clean look */
            background-color: #000; /* Black background for a cinematic feel */
        }

        /* 3. The Container */
        .full-screen-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 4. The Magic: object-fit cover */
        .full-screen-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fills screen without stretching */
            object-position: center; /* Keeps the middle of the image visible */
            display: block;
            transition: opacity 0.5s ease-in; /* Smooth fade-in effect */
        }

        /* 5. UI Overlay (Optional) */
        .content-overlay {
            position: absolute;
            z-index: 10;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none; /* Allows clicks to pass through to the image */
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 4px 15px rgba(0,0,0,0.7);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="full-screen-wrapper">
        <img id="mainImage" src="1.jpg" alt="Full Screen Visual">
        
    </div>

    <script>
        // Simple script to handle dynamic interactions
        const img = document.getElementById('mainImage');

        // Check if image is loaded to apply a fade-in
        if (img.complete) {
            img.style.opacity = "1";
        } else {
            img.style.opacity = "0";
            img.addEventListener('load', () => {
                img.style.opacity = "1";
            });
        }

        // Feature: Double click to toggle "Contain" vs "Cover"
        img.addEventListener('dblclick', () => {
            if (img.style.objectFit === 'contain') {
                img.style.objectFit = 'cover';
            } else {
                img.style.objectFit = 'contain';
            }
        });
    </script>

</body>
</html>
